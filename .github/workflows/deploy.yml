# Lyra extractor deployer
#
# Every night (and on demand), this fetches the LATEST code of
# alexeichhorn/YouTubeKit-Server and deploys it to YOUR Cloudflare Workers
# account. Nothing is mirrored, so nothing can drift: your Worker is always
# <24h behind Alex's newest fix.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   - token made with the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID  - from the Workers & Pages overview sidebar

name: Deploy latest YouTubeKit-Server
on:
  schedule:
    - cron: "0 4 * * *"   # nightly, 04:00 UTC (~06:00 in Stockholm)
  workflow_dispatch:        # manual "Run workflow" button

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest upstream source
        run: git clone --depth 1 https://github.com/alexeichhorn/YouTubeKit-Server.git server

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: server
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
